[tox]
minversion = 4.28.0
envlist = py3,pep8

[testenv]
usedevelop = True
setenv =
  DJANGO_SETTINGS_MODULE=watcher_dashboard.tests.settings
# Note the hash seed is set to 0 until horizon can be tested with a
# random hash seed successfully.
         PYTHONHASHSEED=0
allowlist_externals = /bin/bash
                      rm
                      find
constraints =
  {env:TOX_CONSTRAINTS_FILE:https://releases.openstack.org/constraints/upper/master}
deps =
  -r{toxinidir}/requirements.txt
  -r{toxinidir}/test-requirements.txt
commands =
    rm -f .testrepository/times.dbm
    find . -type f -name "*.pyc" -delete
    find . -type d -name "__pycache__" -delete
    python manage.py test --settings=watcher_dashboard.tests.settings \
        --exclude-tag integration \
        watcher_dashboard

[testenv:pep8]
description =
    Run style checks.
skip_install = true
deps =
    pre-commit
commands =
    pre-commit run --all-files --show-diff-on-failure

[testenv:integration{,-playwright}]
# Run integration tests using Playwright
# Set PLAYWRIGHT_BROWSER to choose browser: chromium, firefox, or webkit (default)
# Example: PLAYWRIGHT_BROWSER=firefox tox -e integration-playwright
# Note: webkit provides Safari-like testing on Linux
# Set PLAYWRIGHT_VIDEO to enable video recording: off (default), on, retain-on-failure
passenv =
  DISPLAY
  XAUTHORITY
  OS_*
  WATCHER_DASHBOARD_URL
  PLAYWRIGHT_BROWSER
  PLAYWRIGHT_HEADLESS
  PLAYWRIGHT_TIMEOUT
  PLAYWRIGHT_OUTPUT_DIR
  PLAYWRIGHT_SCREENSHOTS
  PLAYWRIGHT_VIDEO
  PLAYWRIGHT_TRACE
  PLAYWRIGHT_AUTH_REUSE
  PLAYWRIGHT_IGNORE_HTTPS_ERRORS
setenv =
  DJANGO_SETTINGS_MODULE=watcher_dashboard.test.settings
  DEBUG = pw:api
  # Playwright configuration
  PLAYWRIGHT_BROWSER = {env:PLAYWRIGHT_BROWSER:webkit}
  PLAYWRIGHT_HEADLESS = {env:PLAYWRIGHT_HEADLESS:True}
  PLAYWRIGHT_TIMEOUT = {env:PLAYWRIGHT_TIMEOUT:30000}
  PLAYWRIGHT_SCREENSHOTS = {env:PLAYWRIGHT_SCREENSHOTS:True}
  PLAYWRIGHT_VIDEO = {env:PLAYWRIGHT_VIDEO:off}
  PLAYWRIGHT_TRACE = {env:PLAYWRIGHT_TRACE:off}
  PLAYWRIGHT_AUTH_REUSE = {env:PLAYWRIGHT_AUTH_REUSE:True}
  PLAYWRIGHT_IGNORE_HTTPS_ERRORS = {env:PLAYWRIGHT_IGNORE_HTTPS_ERRORS:False}
  # Store artifacts within the project directory
  PLAYWRIGHT_OUTPUT_DIR = {toxinidir}/playwright
  # Set browser cache path within the project directory
  PLAYWRIGHT_BROWSERS_PATH = {toxinidir}/.playwright
  # Dashboard and OpenStack configuration
  WATCHER_DASHBOARD_URL = {env:WATCHER_DASHBOARD_URL:http://localhost/dashboard}
  OS_USERNAME = {env:OS_USERNAME:admin}
  OS_PASSWORD = {env:OS_PASSWORD:secretadmin}
  OS_AUTH_URL = {env:OS_AUTH_URL:http://localhost/identity}
  OS_PROJECT_NAME = {env:OS_PROJECT_NAME:admin}
  OS_USER_DOMAIN_NAME = {env:OS_USER_DOMAIN_NAME:Default}
  OS_PROJECT_DOMAIN_NAME = {env:OS_PROJECT_DOMAIN_NAME:Default}
  OS_INSECURE = {env:OS_INSECURE:True}
deps =
  {[testenv]deps}
  stestr
allowlist_externals =
  rm
commands =
  # Clean up artifacts from previous runs
  rm -rf {toxinidir}/playwright
  # Browser binaries are installed by playbooks/playwright/pre.yaml, not tox.
  # For local runs: python -m playwright install webkit
  stestr run {posargs}

[testenv:venv]
commands = {posargs}

[testenv:releasenotes]
deps =
  -r{toxinidir}/doc/requirements.txt
commands = sphinx-build -a -E -W -d releasenotes/build/doctrees --keep-going -b html releasenotes/source releasenotes/build/html

[testenv:cover]
commands =
    coverage erase
    coverage run --source watcher_dashboard {toxinidir}/manage.py test \
        --settings=watcher_dashboard.tests.settings \
        --exclude-tag integration watcher_dashboard {posargs}
    coverage xml
    coverage html -d ./cover --omit='*tests*'
    coverage report

[testenv:docs]
deps =
  -r{toxinidir}/requirements.txt
  -r{toxinidir}/doc/requirements.txt
commands = sphinx-build -W -b html doc/source doc/build/html

[testenv:pdf-docs]
deps = {[testenv:docs]deps}
allowlist_externals =
  rm
  make
commands =
  rm -rf doc/build/pdf
  sphinx-build -W --keep-going -b latex doc/source doc/build/pdf
  make -C doc/build/pdf

[testenv:debug]
commands = oslo_debug_helper {posargs}

[flake8]
# H306 imports not in alphabetical order -- superseded by ruff I-rules which
#       handle mixed import styles correctly.
select = H
ignore = H306
show-source = True
builtins = _
exclude=.venv,.git,.tox,dist,doc,*lib/python*,*egg,build,.ropeproject,tools

